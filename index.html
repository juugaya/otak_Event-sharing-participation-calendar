<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>推し活マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="index-calendar.js" defer></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="firebase.js"></script>
  <script src="app.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>推し活マップ</h1>
  <div id="container">
    <div id="sidebar"></div>
    <!-- ★ カレンダー表示エリア -->
  <div id="event-list" style="padding: 20px;">
    イベント読み込み中…
  </div>
    <div id="map"></div>
  </div>
  <div id="info"></div>

  <style>
    #container {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 280px;
      overflow-y: auto;
      background: #fafafa;
      border-right: 1px solid #ddd;
      padding: 10px;
    }
    #map {
      flex: 1;
    }
    .comment-item {
      padding: 8px;
      margin-bottom: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .comment-item strong {
      font-size: 14px;
    }
    .comment-item small {
      color: #666;
    }
  </style>
</body>
</html>
