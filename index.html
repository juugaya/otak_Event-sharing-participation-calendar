<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>推し活マップ</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase v8 読み込み -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="firebase.js"></script>

  <!-- カレンダー表示用 -->
  <script src="index-calendar.js" defer></script>

  <!-- 地図アプリ本体 -->
  <script src="app.js" defer></script>
  <script>
  item.onclick = () => {
  window.location.href = `share.html?event=${eventId}`;
};
</script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>推し活マップ</h1>

  <!-- ★ イベント一覧（カレンダー） -->
  <div id="event-list" style="padding: 20px;">
    イベント読み込み中…
  </div>


  <button id="backBtn" class="back-btn">
    ← 推し活マップに戻る
  </button>

  <!-- ★ 地図モード（イベント選択時のみ表示） -->
  <div id="container" style="display:none;">
    <div id="sidebar"></div>
    <div id="map"></div>
  </div>

  <!-- ★ イベント選択時は地図モードに切り替える -->

  <script>
    if (location.search.includes("event=")) {
      document.getElementById("event-list").style.display = "none";
      document.getElementById("container").style.display = "flex";
    }

    document.getElementById("backBtn").onclick = () => {
      // event パラメータなしのトップへ戻る
      window.location.href = "index.html";
    };
  </script>

  <div id="info"></div>

  <style>
    #container {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 180px;
      overflow-y: auto;
      background: #fafafa;
      border-right: 1px solid #ddd;
      padding: 10px;
    }
    #map {
      flex: 1;
      height: 100vh;   /* ★ これがないと地図は表示されない */
    }
    .comment-item {
      padding: 8px;
      margin-bottom: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .comment-item strong {
      font-size: 14px;
    }
    .comment-item small {
      color: #666;
    }

    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* スマホ向けに大きめにする */
    @media (max-width: 600px) {
      .back-btn {
        padding: 12px 18px;
        font-size: 16px;
      }
    }
  </style>

  <script src="mode-switch.js" defer></script>

</body>
</html>
