<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>推し活動リスト</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase v8 読み込み -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="firebase.js"></script>

  <!-- カレンダー表示用 -->
  <script src="index-calendar.js" defer></script>

  <!-- 地図アプリ本体 -->
  <script src="app.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>推し活動リスト</h1>
  <button id="adminBtn" style="position: fixed; top: 12px; right: 12px; z-index: 9999; padding: 10px 14px; background: rgba(255, 255, 255, 0.9); border: 1px solid #ccc; border-radius: 8px; cursor: pointer;">
    ⚙️ イベント管理
  </button>

  <!-- ★ カレンダー表示 -->
  <div id="calendarSection" class="calendar-section" style="padding: 20px;">
    <h2>イベントカレンダー</h2>
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 12px;">
      <button id="prevMonthBtn" class="calendar-button" style="background: #3498db; color: white;">◀ 前の月</button>
      <button id="nextMonthBtn" class="calendar-button" style="background: #3498db; color: white;">次の月 ▶</button>
      
      <button id="share-x-btn" class="calendar-button" style="background: #1DA1F2; color: white;">🕊️ X（Twitter）にカレンダーを投稿する</button>

      <button id="goAdminBtn" class="calendar-button" style="background: #8E44AD; color: white;">🛠️ イベント管理へ</button>
    </div>
    <div id="calendarMonth" style="margin-bottom: 10px; font-weight: bold;">読み込み中...</div>
    <div id="calendarGrid" class="calendar-grid"></div>
    <div id="calendarStatus" style="margin-top: 10px; color: #666;"></div>
  </div>

  <!-- ★ イベント一覧（カレンダー） -->
  <div id="event-list" style="padding: 20px;">
    イベント読み込み中…
  </div>

  <button id="backBtn" class="back-btn">
    ← 推し活動リストに戻る
  </button>

  <!-- ★ 地図モード（イベント選択時のみ表示） -->
  <div id="container" style="display:none;">
    <div id="sidebar"></div>
    <div id="map"></div>
  </div>

<script>
    (() => {
      // --- URLパラメータの安全な取得 ---
      const currentParam = new URLSearchParams(window.location.search);
      const currentUser = currentParam.get('user') || 'default';
      const base64Data = currentParam.get('data');

      if (location.search.includes("event=")) {
        const eventListEl = document.getElementById("event-list");
        const containerEl = document.getElementById("container");
        if (eventListEl) eventListEl.style.display = "none";
        if (containerEl) containerEl.style.display = "flex";
      }

      // --- 各種ボタンの遷移処理（イベント管理へのパラメータ維持） ---
      const backBtn = document.getElementById("backBtn");
      if (backBtn) {
        backBtn.onclick = () => {
          window.location.href = "index.html";
        };
      }

      if (!window.hasAdminBtnBound) {
        const adminBtn = document.getElementById("adminBtn");
        if (adminBtn) {
          adminBtn.onclick = () => {
            window.location.href = `event-admin.html?user=${currentUser}`;
          };
        }
        const goAdminBtn = document.getElementById("goAdminBtn");
        if (goAdminBtn) {
          goAdminBtn.onclick = () => {
            window.location.href = `event-admin.html?user=${currentUser}`;
          };
        }
        window.hasAdminBtnBound = true;
      }

      // --- 既存の「🕊️ この画面をXで共有」ボタンの処理 ---
      const shareEventBtn = document.getElementById('shareEventBtn');
      if (shareEventBtn) {
        shareEventBtn.onclick = () => {
          const currentEvents = typeof loadEvents === 'function' ? loadEvents() : [];
          const jsonString = JSON.stringify(currentEvents);
          const encodedData = btoa(encodeURIComponent(jsonString));
          const shareUrl = `${window.location.origin}${window.location.pathname}?user=${currentUser}&data=${encodedData}`;
          const tweetText = encodeURIComponent(`${currentUser}のイベントカレンダーを共有します！ #推し活動リスト`);
          const xUrl = `https://x.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(shareUrl)}`;
          window.open(xUrl, '_blank');
        };
      }

      // --- ページを開いたときに、URLにデータがあれば復元する処理 ---
      window.addEventListener('DOMContentLoaded', () => {
        let eventsToShow = [];
        if (base64Data) {
          try {
            const decodedJson = decodeURIComponent(atob(base64Data));
            eventsToShow = JSON.parse(decodedJson);
            console.log("Xからデータを読み込みました", eventsToShow);
          } catch (e) {
            console.error("データの読み込みに失敗しました", e);
          }
        } else {
          eventsToShow = typeof loadEvents === 'function' ? loadEvents() : [];
        }
        if (typeof renderCalendar === 'function') {
          renderCalendar(eventsToShow);
        }
      });

      // --- ローカルストレージ連動関数 ---
      function loadEvents() {
        const storageKey = `events_${currentUser}`;
        const savedEvents = localStorage.getItem(storageKey);
        return savedEvents ? JSON.parse(savedEvents) : [];
      }

      function saveEvents(events) {
        const storageKey = `events_${currentUser}`;
        localStorage.setItem(storageKey, JSON.stringify(events));
      }

      // ==========================================================
      // ★【確定盛り込み版】チェックした予定を確認画面に送る処理
      // ==========================================================
      const shareXBtn = document.getElementById('share-x-btn');
      
      if (shareXBtn) {
        shareXBtn.onclick = () => {
          // 1. 画面上のすべてのチェックボックスを取得
          const checkBoxes = document.querySelectorAll('.event-check');
          const checkedEventIds = [];
          
          // 2. チェックが入っているIDを収集
          checkBoxes.forEach(box => {
            if (box.checked) {
              const dataId = box.getAttribute('data-id');
              if (dataId) {
                checkedEventIds.push(dataId);
              }
            }
          });

          // 3. １つもチェックがなければ警告して止める
          if (checkedEventIds.length === 0) {
            alert('共有したいイベントの「共有」にチェックを入れてからボタンを押してください！');
            return;
          }

          const sharedEventsList = [];
          
          // 4. グローバル変数「events」から対応するデータを徹底的に安全抽出
          if (typeof events !== 'undefined' && events) {
            checkedEventIds.forEach(id => {
              if (events[id]) {
                sharedEventsList.push({
                  id: id,
                  title: events[id].title,
                  date: events[id].date || "" // 日付データも一緒に引き継ぐ
                });
              }
            });
          }

          // 5. データをBase64エンコード化
          const jsonString = JSON.stringify(sharedEventsList);
          const encodedData = btoa(encodeURIComponent(jsonString));
          
          // 6. ユーザー情報を維持したまま、確認画面（preview.html）へ移動
          window.location.href = `preview.html?user=${currentUser}&data=${encodedData}`;
        };
      }
    })();
  </script>


  <div id="info"></div>

  <style>
    #container {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 180px;
      overflow-y: auto;
      background: #fafafa;
      border-right: 1px solid #ddd;
      padding: 10px;
    }
    #map {
      flex: 1;
      height: 100vh;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      background: #fff;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .calendar-cell {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
      cursor: default;
    }
    .calendar-cell.event {
      cursor: pointer;
      background: #eef9ff;
      border: 1px solid #b3dffa;
    }
    .calendar-cell.event:hover {
      background: #d4f0ff;
    }
    .calendar-cell.header {
      background: #e8f4ff;
      font-weight: bold;
      color: #333;
    }
    .calendar-cell.active {
      background: #ffeaa7;
      border: 2px solid #f1c40f;
      font-weight: bold;
    }
    .calendar-button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .comment-item {
      padding: 8px;
      margin-bottom: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .comment-item strong { font-size: 14px; }
    .comment-item small { color: #666; }

    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    @media (max-width: 600px) {
      .back-btn { padding: 12px 18px; font-size: 16px; }
    }

    @media (max-width: 900px) {
      #calendarSection { padding: 12px; }
      #calendarSection h2 { font-size: 1.4rem; }
      .calendar-grid { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
      .calendar-grid::after { content: ''; display: block; width: 12px; }
      .calendar-cell { min-width: 100px; }
      .calendar-button { width: 100%; flex: 1 1 100%; min-width: 0; }
    }

    @media (max-width: 600px) {
      .calendar-grid { grid-template-columns: repeat(7, minmax(100px, 1fr)); }
      .calendar-cell { min-height: 70px; font-size: 12px; padding: 8px; }
      .calendar-cell.header { font-size: 12px; }
      .calendar-button { padding: 12px 14px; font-size: 14px; }
      .calendar-button + .calendar-button { margin-top: 8px; }
      #container { flex-direction: column; height: auto; }
      #sidebar { width: 100%; max-height: 220px; }
      #map { height: 260px; }
      #event-list { padding: 12px; }
    }
  </style>

  <script src="mode-switch.js" defer></script>

</body>
</html>
