<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>推し活動リスト</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase v8 読み込み -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="firebase.js"></script>

  <!-- カレンダー表示用 -->
  <script src="index-calendar.js" defer></script>

  <!-- 地図アプリ本体 -->
  <script src="app.js" defer></script>
   <!-- 外部ライブラリを追加 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>推し活動リスト</h1>
  <button id="adminBtn" style="position: fixed; top: 12px; right: 12px; z-index: 9999; padding: 10px 14px; background: rgba(255, 255, 255, 0.9); border: 1px solid #ccc; border-radius: 8px; cursor: pointer;">
    ⚙️ イベント管理
  </button>

  <!-- ★ カレンダー表示 -->
  <div id="calendarSection" class="calendar-section" style="padding: 20px;">
    <h2>イベントカレンダー</h2>
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 12px;">
      <button id="prevMonthBtn" class="calendar-button" style="background: #3498db; color: white;">◀ 前の月</button>
      <button id="nextMonthBtn" class="calendar-button" style="background: #3498db; color: white;">次の月 ▶</button>
      
      <button id="share-x-btn" class="calendar-button" style="background: #1DA1F2; color: white;">🕊️ X（Twitter）にカレンダーを投稿する</button>

      <button id="goAdminBtn" class="calendar-button" style="background: #8E44AD; color: white;">🛠️ イベント管理へ</button>
    <!-- ★ 選択中イベント リアルタイム表示パネル -->
<div id="selectedEventsPanel" style="
  display: none;
  margin-bottom: 14px;
  padding: 12px 16px;
  background: linear-gradient(135deg, #f0f8ff, #e8f4fb);
  border: 1px solid #b3d9f5;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(52,152,219,0.10);
">
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
    <span style="font-weight: bold; color: #2c7bb6; font-size: 14px;">
      ✅ 選択中のイベント（<span id="selectedCount">0</span>件）
    </span>
    
    <button id="shareSelectedBtn" class="calendar-button" style="
      background: #1DA1F2; color: white; font-size: 13px;
      padding: 7px 14px; border-radius: 6px;
    ">🕊️ 選択イベントをXに投稿</button>
  </div>
  <ul id="selectedEventsList" style="
    margin: 0; padding: 0 0 0 4px;
    list-style: none;
    display: flex; flex-wrap: wrap; gap: 6px;
  "></ul>
</div>
    </div>
    <div id="calendarMonth" style="margin-bottom: 10px; font-weight: bold;">読み込み中...</div>
    <div id="calendarGrid" class="calendar-grid"></div>
    <div id="calendarStatus" style="margin-top: 10px; color: #666;"></div>
  </div>

  <!-- ★ イベント一覧（カレンダー） -->
  <div id="event-list" style="padding: 20px;">
    イベント読み込み中…
  </div>

  <button id="backBtn" class="back-btn">
    ← 推し活動リストに戻る
  </button>

  <!-- ★ 地図モード（イベント選択時のみ表示） -->
  <div id="container" style="display:none;">
    <div id="sidebar"></div>
    <div id="map"></div>
  </div>

  <script>
  // ==========================================================
  // ★ 選択中イベント リアルタイム表示
  // ==========================================================
  function updateSelectedPanel() {
    const panel   = document.getElementById('selectedEventsPanel');
    const list    = document.getElementById('selectedEventsList');
    const countEl = document.getElementById('selectedCount');
    if (!panel || !list || !countEl) return;

    const ids = window.checkedEventIds || new Set();
    const allEvents = window.calendarEvents || {};

    const checkedItems = [];
    ids.forEach(id => {
      const evt = allEvents[id];
      checkedItems.push({
        id,
        title: evt ? evt.title : id,
        date:  evt ? (evt.date || '') : ''
      });
    });

    checkedItems.sort((a, b) => (a.date > b.date ? 1 : -1));

    if (checkedItems.length === 0) {
      panel.style.display = 'none';
      list.innerHTML = '';
      countEl.textContent = '0';
      return;
    }

    panel.style.display = 'block';
    countEl.textContent = checkedItems.length;
    list.innerHTML = checkedItems.map(item => `
      <li style="
        background: white;
        border: 1px solid #b3d9f5;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: #2c7bb6;
        white-space: nowrap;
      ">
        ${item.date
          ? `<span style="color:#888;margin-right:4px;">${item.date}</span>`
          : ''}${item.title}
      </li>
    `).join('');
  }

  // チェックボックス変更を監視
  document.addEventListener('change', e => {
    if (e.target && e.target.classList.contains('event-check')) {
      updateSelectedPanel();
    }
  });

  (() => {
    // --- URLパラメータの取得 ---
    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || 'default';
    const base64Data = urlParams.get('data');

    // --- 管理画面への遷移ボタン ---
    if (!window.hasAdminBtnBound) {
      const adminBtn = document.getElementById("adminBtn");
      if (adminBtn) {
        adminBtn.onclick = () => {
          window.location.href = `event-admin.html?user=${currentUser}`;
        };
      }
      const goAdminBtn = document.getElementById("goAdminBtn");
      if (goAdminBtn) {
        goAdminBtn.onclick = () => {
          window.location.href = `event-admin.html?user=${currentUser}`;
        };
      }
      window.hasAdminBtnBound = true;
    }

    // ページ読み込み時のカレンダーデータ復元
    window.addEventListener('DOMContentLoaded', () => {
      let eventsToShow = [];
      if (base64Data) {
        try {
          const decodedJson = decodeURIComponent(atob(base64Data));
          eventsToShow = JSON.parse(decodedJson);
        } catch (e) {
          console.error("データ復元失敗", e);
        }
      }
      if (typeof renderCalendar === 'function') {
        renderCalendar(eventsToShow);
      }
    });

    // ==========================================================
    // ★ パネル内「選択イベントをXに投稿」ボタン
    // ==========================================================
    const shareSelectedBtn = document.getElementById('shareSelectedBtn');
    if (shareSelectedBtn) {
      shareSelectedBtn.addEventListener('click', () => {
        const ids = window.checkedEventIds || new Set();

        if (ids.size === 0) {
          alert('イベントが選択されていません。');
          return;
        }

        const allEvents = window.calendarEvents || {};
        const sharedEventsList = [];

        ids.forEach(id => {
          const evt = allEvents[id];
          sharedEventsList.push({
            id,
            title: evt ? evt.title : id,
            date:  evt ? (evt.date || '') : ''
          });
        });

        localStorage.setItem('shared_events_bridge', JSON.stringify(sharedEventsList));
        window.location.href = `preview.html?user=${currentUser}`;
      });
    }

    // ==========================================================
    // ★ ボタン行「X（Twitter）にカレンダーを投稿する」ボタン
    // ==========================================================
    const shareXBtn = document.getElementById('share-x-btn');
    if (shareXBtn) {
      shareXBtn.onclick = () => {
        const ids = window.checkedEventIds || new Set();

        if (ids.size === 0) {
          alert('共有したいイベントの「共有」にチェックを入れてからボタンを押してください！');
          return;
        }

        const allEvents = window.calendarEvents || {};
        const sharedEventsList = [];

        ids.forEach(id => {
          const evt = allEvents[id];
          if (evt) {
            sharedEventsList.push({
              id,
              title: evt.title,
              date: evt.date || ''
            });
          } else {
            const dateMatch = id.match(/\d{4}-\d{2}-\d{2}/);
            const fallbackDate = dateMatch ? dateMatch[0] : '';
            const fallbackTitle = id.replace(/^stu_event_[^_]+_/, '').split('_')[0];
            sharedEventsList.push({ id, title: fallbackTitle || 'イベント', date: fallbackDate });
          }
        });

        localStorage.setItem('shared_events_bridge', JSON.stringify(sharedEventsList));
        window.location.href = `preview.html?user=${currentUser}`;
      };
    }

  })();
</script>


  <div id="info"></div>

  <style>
    #container {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 180px;
      overflow-y: auto;
      background: #fafafa;
      border-right: 1px solid #ddd;
      padding: 10px;
    }
    #map {
      flex: 1;
      height: 100vh;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      background: #fff;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .calendar-cell {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
      cursor: default;
    }
    .calendar-cell.event {
      cursor: pointer;
      background: #eef9ff;
      border: 1px solid #b3dffa;
    }
    .calendar-cell.event:hover {
      background: #d4f0ff;
    }
    .calendar-cell.header {
      background: #e8f4ff;
      font-weight: bold;
      color: #333;
    }
    .calendar-cell.active {
      background: #ffeaa7;
      border: 2px solid #f1c40f;
      font-weight: bold;
    }
    .calendar-button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .comment-item {
      padding: 8px;
      margin-bottom: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .comment-item strong { font-size: 14px; }
    .comment-item small { color: #666; }

    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    @media (max-width: 600px) {
      .back-btn { padding: 12px 18px; font-size: 16px; }
    }

    @media (max-width: 900px) {
      #calendarSection { padding: 12px; }
      #calendarSection h2 { font-size: 1.4rem; }
      .calendar-grid { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
      .calendar-grid::after { content: ''; display: block; width: 12px; }
      .calendar-cell { min-width: 100px; }
      .calendar-button { width: 100%; flex: 1 1 100%; min-width: 0; }
    }

    @media (max-width: 600px) {
      .calendar-grid { grid-template-columns: repeat(7, minmax(100px, 1fr)); }
      .calendar-cell { min-height: 70px; font-size: 12px; padding: 8px; }
      .calendar-cell.header { font-size: 12px; }
      .calendar-button { padding: 12px 14px; font-size: 14px; }
      .calendar-button + .calendar-button { margin-top: 8px; }
      #container { flex-direction: column; height: auto; }
      #sidebar { width: 100%; max-height: 220px; }
      #map { height: 260px; }
      #event-list { padding: 12px; }
    }
  </style>

</body>
</html>
