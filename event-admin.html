<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>イベント管理</title>
</head>
<body>
<button id="backBtn" style="position: fixed; top: 12px; left: 12px; z-index: 9999; padding: 10px 14px; background: rgba(255, 255, 255, 0.9); border: 1px solid #ccc; border-radius: 8px; cursor: pointer;">
  ← 推し活マップに戻る
</button>

<h1>イベント管理</h1>

<label>イベントID：</label>
<input id="eventId">

<label>タイトル：</label>
<input id="title">

<label>日付：</label>
<input id="date" type="date">

<label>ピン色：</label>
<input id="pinColor">

<button id="saveBtn">保存</button>
<button id="shareBtn">位置共有ページを開く</button>

<p style="margin-top: 12px; padding: 10px; background: #fff8db; border: 1px solid #f3d27a; border-radius: 6px;">
  イベントを保存してから「位置共有ページを開く」ボタンを押してください。
</p>

<h2>イベント一覧</h2>
<div id="eventList"></div>

<!-- Firebase v8 読み込み -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Firebase 設定 -->
<script src="firebase.js"></script>

<!-- 管理画面のJS（ここで1回だけ読み込む） -->
<script src="event-admin.js"></script>

</body>
</html>
