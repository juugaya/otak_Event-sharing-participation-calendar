<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベントカレンダー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- カレンダーロジック -->
  <script src="calendar.js" defer></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #fafafa;
    }
    h1 {
      margin-bottom: 16px;
    }
    .event-item {
      padding: 12px;
      margin-bottom: 10px;
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
    }
    .event-item:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>
  <h1>イベント一覧</h1>
  <div id="event-list">読み込み中…</div>
</body>
</html>
