<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>投稿内容の確認 - 推し活動リスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #f9f9f9; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; color: #333; margin-top: 0; }
    .event-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    .btn-container { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; text-decoration: none; }
    .btn-back { background: #e0e0e0; color: #333; }
    .btn-x { background: #1DA1F2; color: white; }
  </style>
</head>
<body>

  <div class="card">
    <h1>📝 Xに投稿する予定の確認</h1>
    <p style="font-size: 13px; color: #666;">以下のイベントスケジュールをXにシェアします。よろしければ「この内容でXに投稿する」を押してください。</p>
    
    <div id="preview-list" style="margin: 15px 0; border-top: 1px solid #eee;">
      読み込み中...
    </div>

    <div class="btn-container">
      <button id="backBtn" class="btn btn-back">← カレンダーに戻る</button>
      <button id="finalPostBtn" class="btn btn-x">🕊️ この内容でXに投稿する</button>
    </div>
  </div>

  <script>
    // URLパラメータからデータを取得
    const urlParams = new URLSearchParams(window.location.search);
    const user = urlParams.get('user') || 'default';
    const base64Data = urlParams.get('data');

    const previewList = document.getElementById('preview-list');

    let checkedEvents = [];

    // データの復元と表示
    if (base64Data) {
      try {
        const decodedJson = decodeURIComponent(atob(base64Data));
        checkedEvents = JSON.parse(decodedJson);
        
        previewList.innerHTML = "";
        if (checkedEvents.length === 0) {
          previewList.innerHTML = "<p style='color:red;'>選択された予定がありません。</p>";
        } else {
          // 選択された予定を画面にリスト表示
          checkedEvents.forEach(evt => {
            const div = document.createElement('div');
            div.className = 'event-item';
            div.textContent = `📅 ${evt.date || ''} ： ${evt.title}`;
            previewList.appendChild(div);
          });
        }
      } catch (e) {
        previewList.innerHTML = "<p style='color:red;'>データの読み込みに失敗しました。</p>";
        console.error(e);
      }
    }

    // 「戻る」ボタン：ユーザー名を維持してインデックスに戻る
    document.getElementById('backBtn').onclick = () => {
      window.location.href = `index.html?user=${user}`;
    };

    // 「この内容でXに投稿する」ボタン：ここで初めてXのインテントURLを開く
    document.getElementById('finalPostBtn').onclick = () => {
      if (checkedEvents.length === 0) return;

      // カレンダー側（index.html）で同じデータを再現して開かせるための共有URLを作成
      // ※ローカル環境（file:///）のセキュリティエラーを考慮しつつドメインを解決
      const baseOrigin = window.location.origin === "null" ? "https://juugaya.github.io" : window.location.origin;
      // パスをindex.htmlに差し替えて、カレンダー側でデータが再現されるようにする
      const currentPath = window.location.pathname;
      const indexPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/index.html';
      const shareUrl = `${baseOrigin}${indexPath}?user=${user}&data=${base64Data}`;

      // ツイート本文の作成
      const tweetText = encodeURIComponent(`選んだSTU48の推し活予定カレンダーを共有します！✨\n#推し活動リスト #STU48`);
      const xUrl = `https://x.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(shareUrl)}`;

      window.open(xUrl, '_blank');
    };
  </script>
</body>
</html>
